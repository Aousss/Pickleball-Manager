<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball | Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="app-container">
        <!-- Top Auth Widget -->
        <div id="auth-widget" class="top-auth-widget" style="display: none;">
            <button id="auth-signin-btn" class="btn-sm btn-accent">
                <i class="fa-brands fa-google"></i> Sign In
            </button>
            <div id="auth-profile" class="profile-container" style="display: none;">
                <img id="auth-avatar" class="profile-avatar" src="" alt="Avatar">
                <span id="auth-name" class="profile-name"></span>
                <button id="auth-signout-btn" class="btn-sm btn-danger-outline" title="Sign Out">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="glass-nav">
            <a href="index.html" class="nav-btn" data-target="setup-screen">
                <i class="fa-solid fa-sliders"></i>
                <span>Setup</span>
            </a>
            <a href="matches.html" class="nav-btn" data-target="matches-screen">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Matches</span>
            </a>
            <a href="rankings.html" class="nav-btn active" data-target="ranking-screen">
                <i class="fa-solid fa-ranking-star"></i>
                <span>Rankings</span>
            </a>
            <a href="analytics.html" class="nav-btn" data-target="h2h-screen">
                <i class="fa-solid fa-chart-line"></i>
                <span>Analytics</span>
            </a>
        </nav>

        <!-- Main Content -->
        <main id="main-content">

            <!-- Ranking Screen -->
            <section id="ranking-screen" class="screen active">
                <header class="section-header">
                    <h2>Leaderboard</h2>
                    <div style="display: flex; gap: 8px;">
                        <button id="share-rankings-btn" class="btn-sm"><i class="fa-solid fa-share-nodes"></i>
                            Share</button>
                        <button id="start-playoffs-btn" class="btn-sm admin-only host-only"
                            style="display: none; background: var(--warning); color: black;">
                            <i class="fa-solid fa-trophy"></i> Playoffs
                        </button>
                    </div>
                </header>

                <div class="ranking-container glass-card">
                    <table class="ranking-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;">#</th>
                                <th>Player</th>
                                <th>P</th>
                                <th class="sortable" data-sort="won">W <i class="fa-solid fa-sort"></i></th>
                                <th class="sortable" data-sort="lost">L <i class="fa-solid fa-sort"></i></th>
                                <th class="sortable" data-sort="points">Pts <i class="fa-solid fa-sort"></i></th>
                            </tr>
                        </thead>
                        <tbody id="ranking-body"></tbody>
                    </table>

                    <div
                        style="margin-top: 20px; padding: 20px; background: var(--glass-highlight); border-radius: 0 0 var(--radius-lg) var(--radius-lg); font-size: 0.8rem;">
                        <span
                            style="color: var(--accent); font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 8px;">Ranking
                            Logic</span>
                        <ul style="color: var(--text-secondary); padding-left: 16px; margin: 0;">
                            <li>Standard: Overall wins take precedence.</li>
                            <li>Tie-break 1: Head-to-Head performance.</li>
                            <li>Tie-break 2: Total points accumulated.</li>
                        </ul>
                    </div>
                </div>
            </section>

        </main>

        <footer class="app-footer">
            &copy; 2026 <strong>Pickleball Pro</strong> <br>
            Engineered for excellence.
        </footer>
    </div>

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
