<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball | Tournament Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="app-container">
        <!-- Top Auth Widget -->
        <div id="auth-widget" class="top-auth-widget" style="display: none;">
            <button id="auth-signin-btn" class="btn-sm btn-accent">
                <i class="fa-brands fa-google"></i> Sign In
            </button>
            <div id="auth-profile" class="profile-container" style="display: none;">
                <img id="auth-avatar" class="profile-avatar" src="" alt="Avatar">
                <span id="auth-name" class="profile-name"></span>
                <button id="auth-signout-btn" class="btn-sm btn-danger-outline" title="Sign Out">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="glass-nav">
            <a href="index.html" class="nav-btn active" data-target="setup-screen">
                <i class="fa-solid fa-sliders"></i>
                <span>Setup</span>
            </a>
            <a href="matches.html" class="nav-btn" data-target="matches-screen">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Matches</span>
            </a>
            <a href="rankings.html" class="nav-btn" data-target="ranking-screen">
                <i class="fa-solid fa-ranking-star"></i>
                <span>Rankings</span>
            </a>
            <a href="analytics.html" class="nav-btn" data-target="h2h-screen">
                <i class="fa-solid fa-chart-line"></i>
                <span>Analytics</span>
            </a>
        </nav>

        <!-- Main Content -->
        <main id="main-content">

            <!-- Setup Screen -->
            <section id="setup-screen" class="screen active">
                <header class="hero-header">
                    <h1 class="highlight">Pickleball</h1>
                    <p>Elevate your tournament experience with real-time tracking and intelligent scheduling.</p>
                </header>

                <div class="glass-card">
                    <h2><i class="fa-solid fa-gear"></i> Tournament Config</h2>
                    <div class="input-group">
                        <label for="match-limit"
                            style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; display: block;">Total
                            Target Matches</label>
                        <input type="number" id="match-limit" placeholder="e.g. 20" value="20" min="1">
                    </div>

                    <div class="admin-only host-only" style="margin-top: 20px;">
                        <label
                            style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; display: block;">Manage
                            Tournament</label>
                        <div class="input-group">
                            <select id="tournament-select">
                                <option value="">-- Select or Create --</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <input type="text" id="new-tournament-name" placeholder="New tournament name...">
                            <button id="create-tournament-btn" class="btn-primary" title="Create"><i
                                    class="fa-solid fa-plus"></i></button>
                        </div>
                        <div class="input-group" style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="new-tournament-private" style="width: auto; height: auto; cursor: pointer;">
                            <label for="new-tournament-private" style="margin-bottom: 0; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; user-select: none;">Make Private (access via 6-character code)</label>
                        </div>
                        <div id="tournament-status" style="font-size: 0.75rem; color: var(--accent); min-height: 18px;">
                        </div>
                        <div id="tournament-share-section" class="glass-card" style="display: none; margin-top: 15px; padding: 15px; border-color: var(--accent); background: rgba(127, 173, 128, 0.05); text-align: center;">
                            <div style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;">Tournament Access Code</div>
                            <div id="tournament-share-code" style="font-size: 1.8rem; font-weight: 800; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 10px;">------</div>
                            <button id="copy-share-code-btn" class="btn-sm btn-accent" style="width: auto; margin: 0 auto; display: inline-flex; gap: 8px;">
                                <i class="fa-solid fa-copy"></i> Copy Invitation Code
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Firebase Sync (Collapsible or hidden by default usually, but we keep structure) -->
                <div class="glass-card" style="display: none;">
                    <h2><i class="fa-solid fa-cloud-arrow-up"></i> Cloud Sync</h2>
                    <div class="input-group" style="flex-direction: column; gap: 8px;">
                        <input type="text" id="fb-api-key" placeholder="API Key" style="width: 100%;">
                        <input type="text" id="fb-project-id" placeholder="Project ID" style="width: 100%;">
                        <input type="text" id="fb-db-url" placeholder="Database URL" style="width: 100%;">
                        <div style="display:flex; gap:10px; width: 100%;">
                            <input type="text" id="fb-room" placeholder="Room ID" value="my-tournament" style="flex:1;">
                            <button id="fb-connect-btn" class="btn-primary"
                                style="width: auto; padding: 0 20px;">Connect</button>
                        </div>
                    </div>
                    <div id="sync-status" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 8px;"></div>
                </div>

                <div class="glass-card">
                    <h2><i class="fa-solid fa-users"></i> Participants</h2>
                    <div class="input-group admin-only host-only">
                        <textarea id="player-input" placeholder="Enter names (new line = new player)..."
                            rows="1"></textarea>
                        <button id="add-player-btn" class="btn-primary" title="Add Players"><i
                                class="fa-solid fa-user-plus"></i></button>
                    </div>
                    <ul id="player-list" class="player-list">
                        <li class="empty-state">No players added yet.</li>
                    </ul>
                </div>

                <div class="actions admin-only host-only" style="display: flex; flex-direction: column; gap: 12px;">
                    <button id="start-tournament-btn" class="btn-accent btn-block">
                        <i class="fa-solid fa-play"></i> Launch Tournament
                    </button>
                    <button id="reset-all-btn" class="btn-danger-outline btn-block">
                        <i class="fa-solid fa-rotate-left"></i> Wipe All Data
                    </button>
                </div>
            </section>

            <!-- Import Input (Hidden) -->
            <input type="file" id="import-file" accept=".json" style="display: none;">

        </main>

        <footer class="app-footer">
            &copy; 2026 <strong>Pickleball Pro</strong> <br>
            Engineered for excellence.
        </footer>
    </div>

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
